name: MLOps IBM Attrition Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src

jobs:
  # ─── Job 1: Run the full test suite ──────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore DVC cache
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: dvc-${{ hashFiles('data/*.dvc') }}

      - name: Pull data with DVC
        # Local remote is committed to the repo under .dvc/cache_remote/.
        # To migrate to a cloud remote (e.g. S3), replace with:
        #
        #   env:
        #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        #   run: dvc pull
        run: dvc pull

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --color=yes

  # ─── Job 2: Train model (only runs after tests pass) ─────────────────────
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore DVC cache
        uses: actions/cache@v4
        with:
          path: .dvc/cache
          key: dvc-${{ hashFiles('data/*.dvc') }}

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model and verify performance thresholds
        # train.py exits with code 1 if any threshold in config.yaml is not met
        run: |
          python src/train.py configs/config.yaml

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/
          retention-days: 30