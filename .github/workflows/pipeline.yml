name: MLOps IBM Attrition Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONPATH: src

jobs:
  # ─── Job 1: Run the full test suite ──────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore dataset from DVC cache
        # The DVC remote cache is committed to the repo under .dvc/cache_remote/.
        # We copy the file directly rather than using dvc pull to avoid pathspec
        # version compatibility issues in CI.
        run: |
          python scripts/restore_data.py

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short --color=yes

  # ─── Job 2: Train model (only runs after tests pass) ─────────────────────
  train:
    name: Train Model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore dataset from DVC cache
        run: |
          python scripts/restore_data.py

      - name: Train model and verify performance thresholds
        # train.py exits with code 1 if any threshold in config.yaml is not met
        run: |
          python src/train.py configs/config.yaml

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/
          retention-days: 30